[build]
  command = "NODE_OPTIONS=--max-old-space-size=3072 RSPRESS_SSG_WORKER_THREAD_COUNT=1 npx rspress build"
  publish = "doc_build"

[[headers]]
  for = "/*"
  [headers.values]
    access-control-allow-origin = "https://www.unpkg.com"

[[redirects]]
  from = "/next/*"
  to = "/:splat"
  status = 200

# Tutorials moved out of Get Started into /learn/<slug>.
[[redirects]]
  from = "/guide/start/tutorial-gallery"
  to = "/learn/gallery"
  status = 301
  force = true

[[redirects]]
  from = "/guide/start/tutorial-gallery.html"
  to = "/learn/gallery.html"
  status = 301
  force = true


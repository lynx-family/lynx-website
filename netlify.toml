[build]
  command = "NODE_OPTIONS=--max-old-space-size=3072 RSPRESS_SSG_WORKER_THREAD_COUNT=1 npx rspress build"
  publish = "doc_build"

[[headers]]
  for = "/*"
  [headers.values]
    access-control-allow-origin = "https://www.unpkg.com"

[[redirects]]
  from = "/next/*"
  to = "/:splat"
  status = 200

# Legacy Get Started routes folded into the Quick Start tabbed page.
# Direct visits to the removed pages get a real 301 so external links
# survive the restructure. Client-side pluginClientRedirects covers
# in-app SPA navigation; these rules cover cold loads.
[[redirects]]
  from = "/guide/start/integrate-with-existing-apps"
  to = "/guide/start/quick-start?approach=building-block"
  status = 301
  force = true

[[redirects]]
  from = "/guide/start/integrate-with-existing-apps.html"
  to = "/guide/start/quick-start.html?approach=building-block"
  status = 301
  force = true

[[redirects]]
  from = "/guide/start/integrate-with-existing-apps.md"
  to = "/guide/start/quick-start/building-block.md"
  status = 301
  force = true

[[redirects]]
  from = "/zh/guide/start/integrate-with-existing-apps"
  to = "/zh/guide/start/quick-start?approach=building-block"
  status = 301
  force = true

[[redirects]]
  from = "/zh/guide/start/integrate-with-existing-apps.html"
  to = "/zh/guide/start/quick-start.html?approach=building-block"
  status = 301
  force = true

[[redirects]]
  from = "/zh/guide/start/integrate-with-existing-apps.md"
  to = "/zh/guide/start/quick-start/building-block.md"
  status = 301
  force = true

# Tutorials moved out of Get Started into /learn/<slug>.

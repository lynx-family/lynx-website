[build]
  command = "node scripts/ci/check-build-prereqs.mjs && pnpm gen:og && NODE_OPTIONS=--max-old-space-size=3072 RSPRESS_SSG_WORKER_THREAD_COUNT=1 pnpm exec rspress build"
  publish = "doc_build"

[context.deploy-preview.environment]
  RSPRESS_LIGHTWEIGHT_BUILD = "true"

[[headers]]
  for = "/*"
  [headers.values]
    access-control-allow-origin = "https://www.unpkg.com"

# Tutorials moved from /guide/start/tutorial-* to top-level /learn/*. The
# /next/* rewrite at the bottom doesn't chain into these — direct hits to
# the /next/ form need their own rules. The trailing splat catches the bare
# URL plus the .html and .md variants in one rule.
[[redirects]]
  from = "/guide/start/tutorial-gallery*"
  to = "/learn/gallery:splat"
  status = 301
  force = true

[[redirects]]
  from = "/zh/guide/start/tutorial-gallery*"
  to = "/zh/learn/gallery:splat"
  status = 301
  force = true

[[redirects]]
  from = "/guide/start/tutorial-product-detail*"
  to = "/learn/product-detail:splat"
  status = 301
  force = true

[[redirects]]
  from = "/zh/guide/start/tutorial-product-detail*"
  to = "/zh/learn/product-detail:splat"
  status = 301
  force = true

[[redirects]]
  from = "/next/guide/start/tutorial-gallery*"
  to = "/next/learn/gallery:splat"
  status = 301
  force = true

[[redirects]]
  from = "/next/zh/guide/start/tutorial-gallery*"
  to = "/next/zh/learn/gallery:splat"
  status = 301
  force = true

[[redirects]]
  from = "/next/guide/start/tutorial-product-detail*"
  to = "/next/learn/product-detail:splat"
  status = 301
  force = true

[[redirects]]
  from = "/next/zh/guide/start/tutorial-product-detail*"
  to = "/next/zh/learn/product-detail:splat"
  status = 301
  force = true

# Quick Start lived at /<subsite>/start/quick-start for every subsite while
# we had multiple shared docs (see shared-route-config.ts history). Today
# the canonical is /guide/start/quick-start; redirect historical alternates
# so bookmarks and crawler-cached URLs still resolve.
[[redirects]]
  from = "/ai/start/*"
  to = "/guide/start/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/zh/ai/start/*"
  to = "/zh/guide/start/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/react/start/*"
  to = "/guide/start/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/zh/react/start/*"
  to = "/zh/guide/start/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/rspeedy/start/*"
  to = "/guide/start/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/zh/rspeedy/start/*"
  to = "/zh/guide/start/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/lynx-ui/start/*"
  to = "/guide/start/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/zh/lynx-ui/start/*"
  to = "/zh/guide/start/:splat"
  status = 301
  force = true

# The lynx-ui subsite moved from /lynx-ui to /ui (client-side counterparts
# live in rspress.config.ts). These must stay below the /lynx-ui/start/*
# rules above so historical quick-start URLs keep landing on /guide/start/*,
# and need explicit /next/ variants because the /next/* rewrite at the
# bottom doesn't chain into other rules.
[[redirects]]
  from = "/lynx-ui/*"
  to = "/ui/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/zh/lynx-ui/*"
  to = "/zh/ui/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/next/lynx-ui/*"
  to = "/next/ui/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/next/zh/lynx-ui/*"
  to = "/next/zh/ui/:splat"
  status = 301
  force = true

# Serve current development docs from the site root.
[[redirects]]
  from = "/next/*"
  to = "https://main--lynx-doc.netlify.app/:splat"
  status = 200

# Serve released docs from their branch deploys.
[[redirects]]
  from = "/4.0/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/3.9/*"
  to = "https://release-3-9--lynx-doc.netlify.app/:splat"
  status = 200

[[redirects]]
  from = "/3.8/*"
  to = "https://release-3-8--lynx-doc.netlify.app/:splat"
  status = 200

[[redirects]]
  from = "/3.7/*"
  to = "https://release-3-7--lynx-doc.netlify.app/:splat"
  status = 200

[[redirects]]
  from = "/3.6/*"
  to = "https://release-3-6--lynx-doc.netlify.app/:splat"
  status = 200

[[redirects]]
  from = "/3.5/*"
  to = "https://release-3-5--lynx-doc.netlify.app/:splat"
  status = 200

[[redirects]]
  from = "/3.4/*"
  to = "https://release-3-4--lynx-doc.netlify.app/:splat"
  status = 200

# Rewrite the site root to the latest release while keeping the browser
# location at /.
[[redirects]]
  from = "/"
  to = "/4.0/"
  status = 200
  force = true

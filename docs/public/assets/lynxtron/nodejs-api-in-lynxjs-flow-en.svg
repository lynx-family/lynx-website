<svg width="1440" height="780" viewBox="0 0 1440 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="780" rx="24" fill="#F8FAFC"/>
  <rect x="40" y="40" width="1360" height="700" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <text x="80" y="105" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">
    How Node.js APIs Work in LynxJS
  </text>
  <text x="80" y="145" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">
    lynxPreferences.preloadPaths configures preload scripts, and preload scripts expose JS APIs
  </text>
  <text x="80" y="175" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">
    through the bridge for BTS to call like ordinary JS object methods.
  </text>

  <rect x="70" y="220" width="360" height="312" rx="24" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="104" y="248" width="78" height="78" rx="16" fill="#DBEAFE"/>
  <path d="M128 276H158" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <path d="M143 261V291" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <rect x="116" y="304" width="54" height="12" rx="6" fill="#60A5FA"/>
  <text x="104" y="370" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">
    1. Window Start
  </text>
  <text x="104" y="407" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="18">
    `lynxPreferences.preloadPaths`
  </text>
  <text x="104" y="441" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    Creates a sandbox with
  </text>
  <text x="104" y="470" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    Node.js capabilities
  </text>
  <text x="104" y="499" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    and runs your preload scripts.
  </text>

  <rect x="540" y="220" width="360" height="312" rx="24" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="566" y="248" width="78" height="78" rx="16" fill="#EDE9FE"/>
  <path d="M587 265H623C628.523 265 633 269.477 633 275V299C633 304.523 628.523 309 623 309H587C581.477 309 577 304.523 577 299V275C577 269.477 581.477 265 587 265Z" stroke="#7C3AED" stroke-width="8"/>
  <path d="M593 287H617" stroke="#7C3AED" stroke-width="8" stroke-linecap="round"/>
  <text x="566" y="370" fill="#6D28D9" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">
    2. Expose APIs
  </text>
  <text x="566" y="407" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="18">
    `contextBridge.exposeInLynxBTS`
  </text>
  <text x="566" y="441" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    Registers BTS-callable APIs
  </text>
  <text x="566" y="470" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    to the bridge and exposes only
  </text>
  <text x="566" y="499" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    whitelisted capabilities.
  </text>

  <rect x="1010" y="220" width="360" height="312" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
  <rect x="1036" y="248" width="78" height="78" rx="16" fill="#D1FAE5"/>
  <path d="M1054 270H1096" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  <path d="M1054 288H1084" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  <path d="M1054 306H1070" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  <text x="1036" y="370" fill="#047857" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">
    3. BTS Calls
  </text>
  <text x="1036" y="407" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="18">
    `NativeModules.nodejs.exposed`
  </text>
  <text x="1036" y="441" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    BTS gets the exposed object
  </text>
  <text x="1036" y="470" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    and calls it like normal JS methods.
  </text>

  <path d="M430 364H540" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M517 345L540 364L517 383" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M900 364H1010" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M987 345L1010 364L987 383" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="90" y="580" width="1260" height="92" rx="18" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="124" y="635" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Key Principle
  </text>
  <text x="318" y="635" fill="#7C2D12" font-family="Arial, Helvetica, sans-serif" font-size="20">
    BTS should not get the full Node.js environment directly. Expose only the required APIs through a safe whitelist.
  </text>
</svg>

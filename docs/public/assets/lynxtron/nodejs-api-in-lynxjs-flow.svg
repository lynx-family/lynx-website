<svg width="1440" height="780" viewBox="0 0 1440 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="780" rx="24" fill="#F8FAFC"/>
  <rect x="40" y="40" width="1360" height="700" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <text x="80" y="105" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">
    在 LynxJS 中使用 Node.js API 的工作流程
  </text>
  <text x="80" y="145" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">
    lynxPreferences.preloadPaths 配置 preload scripts，preload scripts 通过桥接层暴露 JS API，BTS 再按普通对象方法调用。
  </text>

  <rect x="70" y="205" width="360" height="312" rx="24" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="104" y="233" width="78" height="78" rx="16" fill="#DBEAFE"/>
  <path d="M128 261H158" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <path d="M143 246V276" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <rect x="116" y="289" width="54" height="12" rx="6" fill="#60A5FA"/>
  <text x="104" y="355" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">
    1. 窗口启动
  </text>
  <text x="104" y="392" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="18">
    `lynxPreferences.preloadPaths`
  </text>
  <text x="104" y="426" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    创建带 Node.js 能力的沙箱环境，
  </text>
  <text x="104" y="455" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    并执行你的 preload scripts。
  </text>

  <rect x="540" y="205" width="360" height="312" rx="24" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="566" y="233" width="78" height="78" rx="16" fill="#EDE9FE"/>
  <path d="M587 250H623C628.523 250 633 254.477 633 260V284C633 289.523 628.523 294 623 294H587C581.477 294 577 289.523 577 284V260C577 254.477 581.477 250 587 250Z" stroke="#7C3AED" stroke-width="8"/>
  <path d="M593 272H617" stroke="#7C3AED" stroke-width="8" stroke-linecap="round"/>
  <text x="566" y="355" fill="#6D28D9" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">
    2. 暴露 API
  </text>
  <text x="566" y="392" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="18">
    `contextBridge.exposeInLynxBTS`
  </text>
  <text x="566" y="426" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    preload scripts 把可供 BTS 调用的 API
  </text>
  <text x="566" y="455" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    注册到桥接层，并只暴露白名单能力。
  </text>

  <rect x="1010" y="205" width="360" height="312" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
  <rect x="1036" y="233" width="78" height="78" rx="16" fill="#D1FAE5"/>
  <path d="M1054 255H1096" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  <path d="M1054 273H1084" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  <path d="M1054 291H1070" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  <text x="1036" y="355" fill="#047857" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">
    3. BTS 调用
  </text>
  <text x="1036" y="392" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="17">
    `NativeModules.nodejs.exposed`
  </text>
  <text x="1036" y="426" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    BTS 获取暴露出来的对象，
  </text>
  <text x="1036" y="455" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19">
    像普通 JS 方法一样完成调用。
  </text>

  <path d="M430 349H540" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M517 330L540 349L517 368" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M900 349H1010" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M987 330L1010 349L987 368" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="90" y="572" width="1260" height="92" rx="18" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="124" y="625" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    关键原则
  </text>
  <text x="250" y="625" fill="#7C2D12" font-family="Arial, Helvetica, sans-serif" font-size="22">
    不让 BTS 直接拥有完整 Node.js 环境，而是通过桥接层按白名单安全暴露必要能力。
  </text>
</svg>

  </text>

  <rect x="840" y="278" width="500" height="404" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2" filter="url(#shadow)"/>
  <text x="880" y="326" fill="#065F46" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="28" font-weight="700">
    Lynx 后台线程
  </text>
  <text x="880" y="356" fill="#047857" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="18" font-weight="700">
    Background Thread · 每窗口隔离 BTS Context
  </text>

  <rect x="880" y="392" width="420" height="96" rx="18" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2"/>
  <text x="912" y="434" fill="#047857" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="28" font-weight="700">
    Preload Scripts
  </text>
  <text x="912" y="466" fill="#475569" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="18">
    Node.js 能力显式暴露
  </text>

  <rect x="880" y="532" width="420" height="96" rx="18" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2"/>
  <text x="912" y="574" fill="#047857" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="26" font-weight="700">
    Lynx Background Runtime
  </text>
  <text x="912" y="606" fill="#475569" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="18">
    BTS Context · Lynx UI 业务逻辑
  </text>

  <path d="M1090 492V526" stroke="#64748B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-gray)"/>
  <text x="1126" y="514" fill="#475569" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="17" font-weight="700">
    exposeInLynxBTS()
  </text>

  <rect x="610" y="392" width="220" height="54" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="720" y="416" text-anchor="middle" fill="#1D4ED8" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="15" font-weight="700">
    sendGlobalEvent()
  </text>
  <text x="720" y="436" text-anchor="middle" fill="#1D4ED8" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="15" font-weight="700">
    Node → Lynx
  </text>
  <path d="M604 462H836" stroke="#2563EB" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-blue)"/>

  <path d="M836 580H604" stroke="#059669" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-green)"/>
  <rect x="610" y="602" width="220" height="54" rx="18" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2"/>
  <text x="720" y="625" text-anchor="middle" fill="#047857" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="14" font-weight="700">
    -lynx-invoke /
  </text>
  <text x="720" y="644" text-anchor="middle" fill="#047857" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="14" font-weight="700">
    -lynx-message
  </text>
</svg>

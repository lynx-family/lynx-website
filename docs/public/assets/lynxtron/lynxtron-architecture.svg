<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-blue" markerWidth="13" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L13 5L0 10Z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" markerWidth="13" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L13 5L0 10Z" fill="#059669"/>
    </marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L12 4.5L0 9Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1440" height="900" rx="28" fill="#F8FAFC"/>
  <rect x="46" y="44" width="1348" height="812" rx="24" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <text x="88" y="112" fill="#0F172A" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="36" font-weight="700">
    Lynxtron 单进程双线程架构
  </text>
  <text x="88" y="152" fill="#475569" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="20">
    一个 App Process 内，主线程与 Lynx 后台线程对称承载 Node.js 与 Lynx 运行时能力。
  </text>

  <rect x="88" y="198" width="1264" height="564" rx="26" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="122" y="242" fill="#64748B" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="19" font-weight="700">
    App Process
  </text>

  <rect x="100" y="278" width="500" height="404" rx="24" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="326" fill="#1E3A8A" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="28" font-weight="700">
    主线程
  </text>
  <text x="140" y="356" fill="#1D4ED8" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="18" font-weight="700">
    Main Thread · 每个应用一个
  </text>

  <rect x="140" y="392" width="420" height="96" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="172" y="434" fill="#1E40AF" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="28" font-weight="700">
    Node.js
  </text>
  <text x="172" y="466" fill="#475569" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="17">
    app · LynxWindow · Menu · dialog · shell
  </text>

  <rect x="140" y="532" width="420" height="96" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="172" y="574" fill="#1E40AF" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="26" font-weight="700">
    Lynx Main-Thread Runtime
  </text>
  <text x="172" y="606" fill="#475569" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="18">

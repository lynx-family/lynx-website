<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">从稳定核心到开放生态的三个建设层次</title>
  <desc id="desc">Now、Next 与 Exploring 三个逐步扩展的建设层次。XElement 与 lynx-ui 在每一层并行演进，从稳定核心能力和真实场景验证，走向共同标准、共享测试、多 DSL 和社区生态。</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", ui-sans-serif, sans-serif; fill: #0f172a; }
      .title { font-size: 27px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #64748b; }
      .scope { font-size: 11px; font-weight: 700; fill: #2563eb; letter-spacing: 1px; }
      .stage { font-size: 13px; font-weight: 800; letter-spacing: 1px; }
      .stage-title { font-size: 21px; font-weight: 700; }
      .stage-subtitle { font-size: 12px; fill: #64748b; }
      .track { font-size: 12px; font-weight: 700; }
      .card-title { font-size: 13px; font-weight: 700; }
      .card-subtitle { font-size: 11px; fill: #64748b; }
      .note { font-size: 12px; fill: #475569; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="24" fill="#ffffff"/>
  <rect x="24" y="24" width="1152" height="672" rx="20" fill="#f8fafc" stroke="#e2e8f0"/>

  <text x="60" y="66" class="title">从稳定核心到开放生态：三个建设层次</text>
  <text x="60" y="92" class="subtitle">XElement 与 lynx-ui 并行演进，共同扩大跨端 UI 的创造空间</text>

  <text x="60" y="126" class="scope">建设范围与共同参与空间持续扩大</text>
  <path d="M 288 122 H 1108" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Now -->
  <rect x="60" y="245" width="330" height="385" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="96" cy="282" r="18" fill="#dbeafe"/>
  <text x="96" y="287" text-anchor="middle" class="stage" fill="#1d4ed8">01</text>
  <text x="126" y="274" class="stage" fill="#2563eb">NOW</text>
  <text x="126" y="299" class="stage-title">稳定核心能力</text>
  <text x="84" y="326" class="stage-subtitle">让能力可用、可理解、可升级</text>

  <rect x="84" y="346" width="135" height="32" rx="16" fill="#dbeafe"/>
  <text x="151.5" y="367" text-anchor="middle" class="track" fill="#1d4ed8">XElement</text>
  <rect x="231" y="346" width="135" height="32" rx="16" fill="#dcfce7"/>
  <text x="298.5" y="367" text-anchor="middle" class="track" fill="#047857">lynx-ui</text>

  <rect x="84" y="394" width="282" height="58" rx="12" fill="#ffffff" stroke="#bfdbfe"/>
  <circle cx="105" cy="423" r="6" fill="#2563eb"/>
  <text x="122" y="419" class="card-title">开放经过生产验证的能力</text>
  <text x="122" y="438" class="card-subtitle">持续改善多平台行为一致性</text>

  <rect x="84" y="464" width="282" height="58" rx="12" fill="#ffffff" stroke="#bfdbfe"/>
  <circle cx="105" cy="493" r="6" fill="#059669"/>
  <text x="122" y="489" class="card-title">补齐文档、示例与预览</text>
  <text x="122" y="508" class="card-subtitle">明确平台支持范围与稳定性</text>

  <rect x="84" y="534" width="282" height="72" rx="12" fill="#ffffff" stroke="#bfdbfe"/>
  <circle cx="105" cy="570" r="6" fill="#7c3aed"/>
  <text x="122" y="558" class="card-title">让真实组件成为验证场</text>
  <text x="122" y="577" class="card-subtitle">收敛 API、交互与默认策略</text>
  <text x="122" y="594" class="card-subtitle">完善兼容矩阵与迁移路径</text>

  <!-- Next -->
  <rect x="435" y="195" width="330" height="435" rx="20" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <circle cx="471" cy="232" r="18" fill="#ede9fe"/>
  <text x="471" y="237" text-anchor="middle" class="stage" fill="#6d28d9">02</text>
  <text x="501" y="224" class="stage" fill="#7c3aed">NEXT</text>
  <text x="501" y="249" class="stage-title">建立公共标准</text>
  <text x="459" y="276" class="stage-subtitle">把经验沉淀为可以共同遵循的基线</text>

  <rect x="459" y="296" width="135" height="32" rx="16" fill="#dbeafe"/>
  <text x="526.5" y="317" text-anchor="middle" class="track" fill="#1d4ed8">XElement</text>
  <rect x="606" y="296" width="135" height="32" rx="16" fill="#dcfce7"/>
  <text x="673.5" y="317" text-anchor="middle" class="track" fill="#047857">lynx-ui</text>

  <rect x="459" y="344" width="282" height="58" rx="12" fill="#ffffff" stroke="#ddd6fe"/>
  <circle cx="480" cy="373" r="6" fill="#7c3aed"/>
  <text x="497" y="369" class="card-title">Element 语义与兼容基线</text>
  <text x="497" y="388" class="card-subtitle">明确跨平台承诺与降级行为</text>

  <rect x="459" y="414" width="282" height="58" rx="12" fill="#ffffff" stroke="#ddd6fe"/>
  <circle cx="480" cy="443" r="6" fill="#2563eb"/>
  <text x="497" y="439" class="card-title">开发、测试与发布规范</text>
  <text x="497" y="458" class="card-subtitle">连接原生实现与组件组合</text>

  <rect x="459" y="484" width="282" height="58" rx="12" fill="#ffffff" stroke="#ddd6fe"/>
  <circle cx="480" cy="513" r="6" fill="#059669"/>
  <text x="497" y="509" class="card-title">提案、准入与维护机制</text>
  <text x="497" y="528" class="card-subtitle">共同建设高质量核心集合</text>

  <rect x="459" y="554" width="282" height="52" rx="12" fill="#ffffff" stroke="#ddd6fe"/>
  <circle cx="480" cy="580" r="6" fill="#ea580c"/>
  <text x="497" y="576" class="card-title">性能 · 内存 · 无障碍 · 共享测试</text>
  <text x="497" y="595" class="card-subtitle">形成可验证的质量基线</text>

  <!-- Exploring -->
  <rect x="810" y="145" width="330" height="485" rx="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <circle cx="846" cy="182" r="18" fill="#dcfce7"/>
  <text x="846" y="187" text-anchor="middle" class="stage" fill="#047857">03</text>
  <text x="876" y="174" class="stage" fill="#059669">EXPLORING</text>
  <text x="876" y="199" class="stage-title">跨越框架边界</text>
  <text x="834" y="226" class="stage-subtitle">让更多参与者在共同基础上继续创造</text>

  <rect x="834" y="246" width="135" height="32" rx="16" fill="#dbeafe"/>
  <text x="901.5" y="267" text-anchor="middle" class="track" fill="#1d4ed8">XElement</text>
  <rect x="981" y="246" width="135" height="32" rx="16" fill="#dcfce7"/>
  <text x="1048.5" y="267" text-anchor="middle" class="track" fill="#047857">更多 DSL</text>

  <rect x="834" y="294" width="282" height="58" rx="12" fill="#ffffff" stroke="#bbf7d0"/>
  <circle cx="855" cy="323" r="6" fill="#2563eb"/>
  <text x="872" y="319" class="card-title">能力与组件的发现、分发</text>
  <text x="872" y="338" class="card-subtitle">探索可持续的依赖与发布机制</text>

  <rect x="834" y="364" width="282" height="58" rx="12" fill="#ffffff" stroke="#bbf7d0"/>
  <circle cx="855" cy="393" r="6" fill="#7c3aed"/>
  <text x="872" y="389" class="card-title">下沉框架无关行为</text>
  <text x="872" y="408" class="card-subtitle">让各 DSL 只保留符合习惯的薄封装</text>

  <rect x="834" y="434" width="282" height="58" rx="12" fill="#ffffff" stroke="#bbf7d0"/>
  <circle cx="855" cy="463" r="6" fill="#059669"/>
  <text x="872" y="459" class="card-title">多 DSL 复用与共同测试</text>
  <text x="872" y="478" class="card-subtitle">共享 XElement、语义和质量基线</text>

  <rect x="834" y="504" width="282" height="76" rx="12" fill="#ffffff" stroke="#bbf7d0"/>
  <circle cx="855" cy="542" r="6" fill="#ea580c"/>
  <text x="872" y="530" class="card-title">打开社区创造空间</text>
  <text x="872" y="549" class="card-subtitle">原生扩展 · 行业组件</text>
  <text x="872" y="568" class="card-subtitle">设计系统 · 新的交互范式</text>

  <rect x="327" y="647" width="546" height="28" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="600" y="666" text-anchor="middle" class="note">三个建设层次，而不是一份带固定日期的交付承诺</text>
</svg>

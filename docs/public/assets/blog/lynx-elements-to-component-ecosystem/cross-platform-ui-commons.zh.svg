<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">从能力到公共资产的跨端 UI 生态飞轮</title>
  <desc id="desc">跨行业真实需求、XElement 原生扩展生态、lynx-ui 与更多 DSL 组件生态、社区复用与共同维护形成持续循环。Element 语义、行为规范、兼容基线和共享测试构成循环中央的跨端 UI 公共基础。</desc>
  <defs>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <style>
      text { font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", ui-sans-serif, sans-serif; fill: #0f172a; }
      .title { font-size: 27px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #64748b; }
      .node-title { font-size: 18px; font-weight: 700; }
      .node-subtitle { font-size: 12px; fill: #64748b; }
      .chip { font-size: 11px; font-weight: 600; }
      .center-title { font-size: 21px; font-weight: 800; }
      .center-subtitle { font-size: 12px; fill: #6d28d9; font-weight: 600; }
      .arrow-label { font-size: 11px; font-weight: 700; fill: #7c3aed; }
      .statement { font-size: 14px; font-weight: 700; fill: #475569; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="24" fill="#ffffff"/>
  <rect x="24" y="24" width="1152" height="712" rx="20" fill="#f8fafc" stroke="#e2e8f0"/>

  <text x="60" y="66" class="title">从能力到公共资产：跨端 UI 的生态飞轮</text>
  <text x="60" y="92" class="subtitle">XElement 与 lynx-ui 相互验证、相互推动，让一次实现成为整个生态可以继续创造的基础</text>

  <!-- Ecosystem flywheel -->
  <path d="M 750 162 C 860 164 992 230 1000 310" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <path d="M 1000 450 C 990 545 862 620 750 620" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <path d="M 450 620 C 338 620 210 545 200 450" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <path d="M 200 310 C 208 230 340 164 450 162" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)"/>

  <rect x="790" y="206" width="92" height="22" rx="11" fill="#faf5ff"/>
  <text x="836" y="221" text-anchor="middle" class="arrow-label">提出能力需求</text>
  <rect x="891" y="519" width="82" height="22" rx="11" fill="#faf5ff"/>
  <text x="932" y="534" text-anchor="middle" class="arrow-label">形成组件入口</text>
  <rect x="227" y="519" width="82" height="22" rx="11" fill="#faf5ff"/>
  <text x="268" y="534" text-anchor="middle" class="arrow-label">扩大生态复用</text>
  <rect x="306" y="206" width="82" height="22" rx="11" fill="#faf5ff"/>
  <text x="347" y="221" text-anchor="middle" class="arrow-label">反馈真实场景</text>

  <!-- Top: needs -->
  <rect x="450" y="112" width="300" height="100" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <circle cx="486" cy="148" r="17" fill="#ffedd5"/>
  <path d="M 478 150 h16 M 481 144 h10 M 484 138 h4" fill="none" stroke="#ea580c" stroke-width="2" stroke-linecap="round"/>
  <text x="516" y="145" class="node-title">跨行业的真实需求</text>
  <text x="516" y="165" class="node-subtitle">高频 · 可复用 · 对性能与交互延迟敏感</text>
  <rect x="476" y="177" width="70" height="22" rx="11" fill="#ffedd5"/><text x="511" y="192" text-anchor="middle" class="chip" fill="#c2410c">内容</text>
  <rect x="554" y="177" width="70" height="22" rx="11" fill="#ffedd5"/><text x="589" y="192" text-anchor="middle" class="chip" fill="#c2410c">电商</text>
  <rect x="632" y="177" width="92" height="22" rx="11" fill="#ffedd5"/><text x="678" y="192" text-anchor="middle" class="chip" fill="#c2410c">生产力工具</text>

  <!-- Right: XElement -->
  <rect x="850" y="310" width="300" height="140" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="874" y="334" width="38" height="38" rx="10" fill="#dbeafe"/>
  <path d="M 886 345 h14 v14 h-14 z M 890 341 v4 M 890 359 v4 M 882 349 h4 M 900 349 h4" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  <text x="926" y="348" class="node-title">XElement 原生扩展生态</text>
  <text x="926" y="368" class="node-subtitle">官方核心与社区扩展共同扩大能力边界</text>
  <rect x="874" y="391" width="75" height="25" rx="12.5" fill="#dbeafe"/><text x="911.5" y="408" text-anchor="middle" class="chip" fill="#1d4ed8">Android</text>
  <rect x="957" y="391" width="54" height="25" rx="12.5" fill="#dbeafe"/><text x="984" y="408" text-anchor="middle" class="chip" fill="#1d4ed8">iOS</text>
  <rect x="1019" y="391" width="104" height="25" rx="12.5" fill="#dbeafe"/><text x="1071" y="408" text-anchor="middle" class="chip" fill="#1d4ed8">HarmonyOS</text>
  <text x="874" y="435" class="node-subtitle">跨平台实现 · 原生交互 · 低延迟能力</text>

  <!-- Bottom: component ecosystems -->
  <rect x="450" y="570" width="300" height="100" rx="18" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <circle cx="486" cy="606" r="17" fill="#dcfce7"/>
  <rect x="478" y="598" width="7" height="7" rx="2" fill="#059669"/><rect x="489" y="598" width="7" height="7" rx="2" fill="#059669"/><rect x="478" y="609" width="7" height="7" rx="2" fill="#059669"/><rect x="489" y="609" width="7" height="7" rx="2" fill="#059669"/>
  <text x="516" y="603" class="node-title">lynx-ui 与更多 DSL</text>
  <text x="516" y="623" class="node-subtitle">共享 XElement、行为规范与测试套件</text>
  <rect x="476" y="638" width="80" height="22" rx="11" fill="#dcfce7"/><text x="516" y="653" text-anchor="middle" class="chip" fill="#047857">可组合 API</text>
  <rect x="564" y="638" width="70" height="22" rx="11" fill="#dcfce7"/><text x="599" y="653" text-anchor="middle" class="chip" fill="#047857">薄封装</text>
  <rect x="642" y="638" width="82" height="22" rx="11" fill="#dcfce7"/><text x="683" y="653" text-anchor="middle" class="chip" fill="#047857">共同验证</text>

  <!-- Left: reuse -->
  <rect x="50" y="310" width="300" height="140" rx="20" fill="#ecfeff" stroke="#67e8f9" stroke-width="1.5"/>
  <circle cx="86" cy="350" r="18" fill="#cffafe"/>
  <path d="M 78 350 h16 M 86 342 v16 M 80 344 l12 12 M 92 344 l-12 12" fill="none" stroke="#0891b2" stroke-width="1.8" stroke-linecap="round"/>
  <text x="116" y="348" class="node-title">生态复用与共同维护</text>
  <text x="116" y="368" class="node-subtitle">让能力跨越团队、框架与行业边界</text>
  <rect x="74" y="391" width="80" height="25" rx="12.5" fill="#cffafe"/><text x="114" y="408" text-anchor="middle" class="chip" fill="#0e7490">社区组件</text>
  <rect x="162" y="391" width="80" height="25" rx="12.5" fill="#cffafe"/><text x="202" y="408" text-anchor="middle" class="chip" fill="#0e7490">行业方案</text>
  <rect x="250" y="391" width="76" height="25" rx="12.5" fill="#cffafe"/><text x="288" y="408" text-anchor="middle" class="chip" fill="#0e7490">设计系统</text>
  <text x="74" y="435" class="node-subtitle">开放工具 · 共同标准 · 可持续贡献</text>

  <!-- Shared foundation -->
  <circle cx="600" cy="390" r="142" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
  <circle cx="600" cy="390" r="125" fill="#ffffff" stroke="#ddd6fe" stroke-dasharray="5 4"/>
  <text x="600" y="326" text-anchor="middle" class="center-title">跨端 UI 的公共基础</text>
  <text x="600" y="350" text-anchor="middle" class="center-subtitle">XElement × lynx-ui：相互验证，共同演进</text>

  <rect x="505" y="373" width="90" height="34" rx="17" fill="#dbeafe"/>
  <text x="550" y="395" text-anchor="middle" class="chip" fill="#1d4ed8">Element 语义</text>
  <rect x="605" y="373" width="90" height="34" rx="17" fill="#ede9fe"/>
  <text x="650" y="395" text-anchor="middle" class="chip" fill="#6d28d9">行为规范</text>
  <rect x="505" y="417" width="90" height="34" rx="17" fill="#dcfce7"/>
  <text x="550" y="439" text-anchor="middle" class="chip" fill="#047857">兼容基线</text>
  <rect x="605" y="417" width="90" height="34" rx="17" fill="#ffedd5"/>
  <text x="650" y="439" text-anchor="middle" class="chip" fill="#c2410c">共享测试</text>
  <text x="600" y="478" text-anchor="middle" class="node-subtitle">提案 · 准入 · 工具 · 分发 · 长期维护</text>

  <rect x="328" y="694" width="544" height="28" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="600" y="713" text-anchor="middle" class="statement">一次性实现  →  可复用能力  →  共同维护的公共资产</text>
</svg>

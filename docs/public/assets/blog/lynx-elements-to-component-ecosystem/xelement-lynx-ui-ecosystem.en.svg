<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">XElement and lynx-ui shared ecosystem</title>
  <desc id="desc">An architecture diagram showing native platforms flowing through the XElement ecosystem and a shared Element contract into lynx-ui and other DSL component libraries, with product usage feeding API, compatibility, performance, and testing requirements back into XElement.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .title { font-size: 27px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #64748b; }
      .group-title { font-size: 18px; font-weight: 700; }
      .group-subtitle { font-size: 12px; fill: #64748b; }
      .panel-title { font-size: 14px; font-weight: 700; }
      .panel-subtitle { font-size: 11px; fill: #64748b; }
      .chip { font-size: 11px; font-weight: 600; }
      .contract-label { font-size: 13px; font-weight: 600; }
      .arrow-label { font-size: 11px; font-weight: 600; }
      .legend { font-size: 11px; fill: #475569; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="24" fill="#ffffff"/>
  <rect x="24" y="24" width="1152" height="672" rx="20" fill="#f8fafc" stroke="#e2e8f0"/>

  <text x="60" y="66" class="title">XElement × lynx-ui: a shared UI ecosystem</text>
  <text x="60" y="92" class="subtitle">Native capabilities and frontend components evolve through the same Element contract</text>

  <!-- Primary capability flow -->
  <path d="M 390 350 H 450" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M 750 350 H 810" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M 235 570 V 510" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M 980 200 V 176" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <!-- Feedback loop -->
  <path d="M 1050 510 V 538 H 350 V 510" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)"/>

  <!-- Product outcome -->
  <rect x="830" y="104" width="300" height="72" rx="16" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <circle cx="864" cy="140" r="18" fill="#ffedd5"/>
  <path d="M 856 140 l6 6 12-14" fill="none" stroke="#ea580c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="894" y="134" class="panel-title">Product experiences &amp; design systems</text>
  <text x="894" y="154" class="panel-subtitle">Composable · customizable · native quality</text>

  <!-- XElement ecosystem -->
  <rect x="50" y="200" width="340" height="310" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="74" y="224" width="38" height="38" rx="10" fill="#dbeafe"/>
  <path d="M 86 235 h14 v14 h-14 z M 90 231 v4 M 90 249 v4 M 82 239 h4 M 100 239 h4" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  <text x="126" y="239" class="group-title">XElement ecosystem</text>
  <text x="126" y="258" class="group-subtitle">Extend native capabilities · align platforms</text>

  <rect x="76" y="282" width="288" height="64" rx="12" fill="#ffffff" stroke="#bfdbfe"/>
  <circle cx="101" cy="314" r="11" fill="#dbeafe"/>
  <path d="M 96 314 l4 4 7-8" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="122" y="309" class="panel-title">Lynx-maintained XElements</text>
  <text x="122" y="329" class="panel-subtitle">Stable semantics and long-term maintenance</text>

  <rect x="76" y="358" width="288" height="64" rx="12" fill="#ffffff" stroke="#bfdbfe" stroke-dasharray="5 4"/>
  <circle cx="101" cy="390" r="11" fill="#ede9fe"/>
  <path d="M 95 390 h12 M 101 384 v12" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
  <text x="122" y="385" class="panel-title">Community &amp; vertical extensions</text>
  <text x="122" y="405" class="panel-subtitle">New native capabilities built on shared standards</text>

  <rect x="76" y="442" width="54" height="25" rx="12.5" fill="#dbeafe"/><text x="103" y="459" text-anchor="middle" class="chip" fill="#1d4ed8">Input</text>
  <rect x="138" y="442" width="62" height="25" rx="12.5" fill="#dbeafe"/><text x="169" y="459" text-anchor="middle" class="chip" fill="#1d4ed8">Overlay</text>
  <rect x="208" y="442" width="46" height="25" rx="12.5" fill="#dbeafe"/><text x="231" y="459" text-anchor="middle" class="chip" fill="#1d4ed8">SVG</text>
  <rect x="262" y="442" width="76" height="25" rx="12.5" fill="#dbeafe"/><text x="300" y="459" text-anchor="middle" class="chip" fill="#1d4ed8">Refresh</text>
  <rect x="107" y="474" width="60" height="25" rx="12.5" fill="#dbeafe"/><text x="137" y="491" text-anchor="middle" class="chip" fill="#1d4ed8">Video</text>
  <rect x="175" y="474" width="94" height="25" rx="12.5" fill="#dbeafe"/><text x="222" y="491" text-anchor="middle" class="chip" fill="#1d4ed8">ViewPager</text>
  <rect x="277" y="474" width="61" height="25" rx="12.5" fill="#dbeafe"/><text x="307.5" y="491" text-anchor="middle" class="chip" fill="#1d4ed8">WebView</text>

  <!-- Shared Element contract -->
  <rect x="450" y="225" width="300" height="255" rx="20" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <rect x="474" y="249" width="38" height="38" rx="10" fill="#ede9fe"/>
  <path d="M 486 258 h14 v19 h-14 z M 489 263 h8 M 489 268 h8 M 489 273 h5" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="526" y="264" class="group-title">Element contract</text>
  <text x="526" y="283" class="group-subtitle">The shared boundary between both ecosystems</text>

  <rect x="476" y="306" width="248" height="35" rx="9" fill="#ffffff" stroke="#ddd6fe"/>
  <circle cx="496" cy="323.5" r="5" fill="#7c3aed"/><text x="510" y="328" class="contract-label">API</text>
  <rect x="476" y="351" width="248" height="35" rx="9" fill="#ffffff" stroke="#ddd6fe"/>
  <circle cx="496" cy="368.5" r="5" fill="#2563eb"/><text x="510" y="373" class="contract-label">Cross-platform semantics</text>
  <rect x="476" y="396" width="248" height="35" rx="9" fill="#ffffff" stroke="#ddd6fe"/>
  <circle cx="496" cy="413.5" r="5" fill="#059669"/><text x="510" y="418" class="contract-label">Compatibility</text>
  <rect x="476" y="441" width="248" height="25" rx="9" fill="#ffffff" stroke="#ddd6fe"/>
  <circle cx="496" cy="453.5" r="5" fill="#ea580c"/><text x="510" y="458" class="contract-label">Test baseline</text>

  <!-- Frontend component ecosystem -->
  <rect x="810" y="200" width="340" height="310" rx="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <rect x="834" y="224" width="38" height="38" rx="10" fill="#dcfce7"/>
  <rect x="845" y="235" width="7" height="7" rx="2" fill="#059669"/><rect x="856" y="235" width="7" height="7" rx="2" fill="#059669"/><rect x="845" y="246" width="7" height="7" rx="2" fill="#059669"/><rect x="856" y="246" width="7" height="7" rx="2" fill="#059669"/>
  <text x="886" y="239" class="group-title">Frontend component ecosystems</text>
  <text x="886" y="258" class="group-subtitle">State · behavior · defaults · compatibility</text>

  <rect x="836" y="282" width="288" height="116" rx="12" fill="#ffffff" stroke="#bbf7d0"/>
  <circle cx="862" cy="311" r="13" fill="#dcfce7"/>
  <path d="M 855 311 h14 M 862 304 v14" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
  <text x="886" y="306" class="panel-title">lynx-ui</text>
  <text x="886" y="326" class="panel-subtitle">Official ReactLynx primitives · proving ground</text>
  <rect x="852" y="345" width="66" height="25" rx="12.5" fill="#dcfce7"/><text x="885" y="362" text-anchor="middle" class="chip" fill="#047857">Popover</text>
  <rect x="926" y="345" width="58" height="25" rx="12.5" fill="#dcfce7"/><text x="955" y="362" text-anchor="middle" class="chip" fill="#047857">Dialog</text>
  <rect x="992" y="345" width="52" height="25" rx="12.5" fill="#dcfce7"/><text x="1018" y="362" text-anchor="middle" class="chip" fill="#047857">Sheet</text>
  <rect x="1052" y="345" width="56" height="25" rx="12.5" fill="#dcfce7"/><text x="1080" y="362" text-anchor="middle" class="chip" fill="#047857">Form</text>
  <text x="852" y="388" class="panel-subtitle">Also Swiper · FeedList · Input · and more</text>

  <rect x="836" y="412" width="288" height="66" rx="12" fill="#ffffff" stroke="#bbf7d0" stroke-dasharray="5 4"/>
  <circle cx="862" cy="445" r="11" fill="#e0f2fe"/>
  <path d="M 856 445 h12 M 862 439 v12" fill="none" stroke="#0284c7" stroke-width="2" stroke-linecap="round"/>
  <text x="886" y="440" class="panel-title">Other DSL component libraries</text>
  <text x="886" y="460" class="panel-subtitle">Reuse the same XElements, semantics, and tests</text>

  <!-- Native platforms -->
  <rect x="95" y="570" width="280" height="74" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="116" y="594" class="panel-title">Native platforms</text>
  <rect x="116" y="608" width="72" height="24" rx="12" fill="#f1f5f9"/><text x="152" y="624" text-anchor="middle" class="chip">Android</text>
  <rect x="196" y="608" width="52" height="24" rx="12" fill="#f1f5f9"/><text x="222" y="624" text-anchor="middle" class="chip">iOS</text>
  <rect x="256" y="608" width="94" height="24" rx="12" fill="#f1f5f9"/><text x="303" y="624" text-anchor="middle" class="chip">HarmonyOS</text>

  <!-- Arrow labels -->
  <rect x="412" y="326" width="72" height="18" rx="9" fill="#ffffff"/><text x="448" y="339" text-anchor="middle" class="arrow-label" fill="#2563eb">capabilities</text>
  <rect x="732" y="326" width="72" height="18" rx="9" fill="#ffffff"/><text x="768" y="339" text-anchor="middle" class="arrow-label" fill="#2563eb">primitives</text>
  <rect x="250" y="535" width="90" height="18" rx="9" fill="#ffffff"/><text x="295" y="548" text-anchor="middle" class="arrow-label" fill="#2563eb">native impl.</text>
  <rect x="982" y="180" width="92" height="18" rx="9" fill="#ffffff"/><text x="1028" y="193" text-anchor="middle" class="arrow-label" fill="#2563eb">composable UI</text>
  <rect x="446" y="520" width="294" height="22" rx="11" fill="#faf5ff" stroke="#e9d5ff"/><text x="593" y="535" text-anchor="middle" class="arrow-label" fill="#7c3aed">usage · APIs · compatibility · performance · tests</text>

  <!-- Legend -->
  <line x1="434" y1="674" x2="474" y2="674" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="486" y="678" class="legend">capability flow</text>
  <line x1="610" y1="674" x2="650" y2="674" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <text x="662" y="678" class="legend">feedback loop</text>
</svg>

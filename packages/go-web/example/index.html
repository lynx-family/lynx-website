<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Web — Standalone Example</title>
    <style>
      :root {
        --sb-bg: #f5f5f7;
        --sb-surface: #ffffff;
        --sb-border: #e0e0e0;
        --sb-text: #1d1d1f;
        --sb-text-dim: #86868b;
        --sb-accent: #0071e3;
        --sb-font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', Menlo,
          monospace;
      }

      [theme-mode='dark'] {
        --sb-bg: #1c1c1e;
        --sb-surface: #2c2c2e;
        --sb-border: #3a3a3c;
        --sb-text: #e5e5e7;
        --sb-text-dim: #8e8e93;
        --sb-accent: #0a84ff;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI',
          sans-serif;
        background: var(--sb-bg);
        color: var(--sb-text);
        transition:
          background 0.2s,
          color 0.2s;
      }
      #root {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
